name: Process Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Link ảnh gốc (direct link)"
        required: true
        type: string
      job_id:
        description: "ID tùy ý để nhận dạng kết quả (ví dụ: haiau_001)"
        required: false
        default: "output"
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cần để tạo Release và upload asset

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install opencv-python-headless numpy

      - name: Run image processor
        run: |
          python process.py "${{ inputs.image_url }}" "result_${{ inputs.job_id }}.jpg"

      - name: Upload result to GitHub Release
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILENAME="result_${{ inputs.job_id }}.jpg"
          TAG="result-$(date +%Y%m%d-%H%M%S)-${{ inputs.job_id }}"

          # Tạo release mới rồi upload file ảnh vào đó
          gh release create "$TAG" "$FILENAME" \
            --title "Result: ${{ inputs.job_id }}" \
            --notes "Ảnh được xử lý từ: ${{ inputs.image_url }}" \
            --repo "${{ github.repository }}"

          # Lấy link download trực tiếp
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo ""
          echo "============================================"
          echo "✅ LINK ẢNH KẾT QUẢ:"
          echo "$DOWNLOAD_URL"
          echo "============================================"

      - name: Print result link
        run: |
          echo "🔗 Link tải ảnh: ${{ steps.upload.outputs.download_url }}"
