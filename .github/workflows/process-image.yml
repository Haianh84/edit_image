name: Process Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Link ảnh gốc (direct link)"
        required: true
        type: string
      job_id:
        description: "ID tùy ý để nhận dạng kết quả (ví dụ: haiau_001)"
        required: false
        default: "output"
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-opencv-numpy-v1

      - name: Install dependencies
        run: pip install --quiet opencv-python-headless numpy

      - name: Run image processor
        run: |
          python process.py "${{ inputs.image_url }}" "result_${{ inputs.job_id }}.jpg"

      - name: Upload result to GitHub Release
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILENAME="result_${{ inputs.job_id }}.jpg"
          TAG="result-${{ inputs.job_id }}"

          gh release create "$TAG" "$FILENAME" \
            --title "Result: ${{ inputs.job_id }}" \
            --notes "Ảnh được xử lý từ: ${{ inputs.image_url }}" \
            --repo "${{ github.repository }}"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "✅ LINK ẢNH KẾT QUẢ: $DOWNLOAD_URL"

      - name: Print result link
        run: |
          echo "🔗 Link tải ảnh: ${{ steps.upload.outputs.download_url }}"
